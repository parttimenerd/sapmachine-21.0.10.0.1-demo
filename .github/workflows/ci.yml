name: sapmachine-21.0.10.0.1 demo

on:
  push:
  workflow_dispatch:

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SapMachine JDK
        # SapMachine versions like 21.0.10.0.1 are typically represented as SemVer build metadata: 21.0.10+0.1
        uses: actions/setup-java@v5
        with:
          distribution: sapmachine
          java-version: '21.0.10'

      - name: Show Java version
        run: |
          java -version
          javac -version
