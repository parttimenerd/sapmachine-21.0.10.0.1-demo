name: sapmachine-21.0.10.0.1 demo

# Replicates the customer CI pattern from:
# https://github.com/cap-java/cds-feature-console/actions/runs/23295977729/workflow
#
# Root cause: SapMachine publishes Java 21.0.10 as release "21.0.10.0.1",
# which actions/setup-java represents in SemVer as "21.0.10+0.1".
# Using bare "21.0.10" resolves to no exact match (would require "21.0.10.0.0")
# and either fails or silently picks a wrong version.
#
# Fix: use "21.0.10+0.1" (SemVer) instead of "21.0.10" in the matrix.

env:
  MAVEN_VERSION: "3.9.11"

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # ❌ "21.0.10"    — broken: no SapMachine release matches this exact version
        # ✅ "21.0.10+0.1" — fixed:  matches SapMachine release 21.0.10.0.1
        java-version: ["17.0.14+0.1", "21.0.10"]   # customer's original (21.0.10 will fail)
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Build
        uses: ./.github/actions/build
        with:
          java-version: ${{ matrix.java-version }}
          maven-version: ${{ env.MAVEN_VERSION }}

  build-fixed:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # ✅ Correct SemVer representations of SapMachine release names:
        #    17.0.14.0.1  → 17.0.14+0.1
        #    21.0.10.0.1  → 21.0.10+0.1
        java-version: ["17.0.14+0.1", "21.0.10+0.1"]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Build
        uses: ./.github/actions/build
        with:
          java-version: ${{ matrix.java-version }}
          maven-version: ${{ env.MAVEN_VERSION }}
