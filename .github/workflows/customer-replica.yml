name: customer replica (cap-java/cds-feature-console)

# Direct replica of the failing customer workflow:
# Workflow file: https://github.com/cap-java/cds-feature-console/actions/runs/23295977729/workflow
# PR:           https://github.com/cap-java/cds-feature-console/pull/12
#
# The matrix entry "21.0.10" does NOT match any SapMachine release because
# SapMachine 21.0.10.0.1 is represented in SemVer as "21.0.10+0.1".
# actions/setup-java therefore cannot resolve "21.0.10" and the build fails.

env:
  MAVEN_VERSION: "3.9.11"

on:
  workflow_dispatch: # Allow manual trigger
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ["17.0.18", "21.0.10"] # ← "21.0.10" fails for sapmachine distribution
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Build
        uses: ./.github/actions/build
        with:
          java-version: ${{ matrix.java-version }}
          maven-version: ${{ env.MAVEN_VERSION }}
