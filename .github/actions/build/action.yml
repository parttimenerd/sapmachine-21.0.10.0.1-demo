name: Build
description: >
  Set up SapMachine JDK + Maven and run a Maven build.
  Mirrors the .github/actions/build composite action used by cap-java/cds-feature-console.

inputs:
  java-version:
    description: >
      Java version for actions/setup-java (distribution: sapmachine).
      Use SemVer build-metadata notation for SapMachine releases, e.g.:
        - "21.0.10+0.1"  → SapMachine release 21.0.10.0.1  ✅
        - "21.0.10"      → no matching SapMachine release   ❌
    required: true
  maven-version:
    description: Maven version to install via setup-java toolchain.
    required: true

runs:
  using: composite
  steps:
    - name: Set up SapMachine JDK ${{ inputs.java-version }}
      uses: actions/setup-java@v4
      with:
        distribution: sapmachine
        java-version: ${{ inputs.java-version }}
        # actions/setup-java uses "sapmachine" JVM list from:
        # https://api.github.com/repos/SAP/SapMachine/releases
        # Versions are stored as SemVer; SapMachine build qualifier is encoded
        # as build metadata (+0.1 for the first SapMachine-specific patch).

    - name: Set up Maven ${{ inputs.maven-version }}
      uses: stCarolas/setup-maven@v5
      with:
        maven-version: ${{ inputs.maven-version }}

    - name: Print toolchain versions
      shell: bash
      run: |
        echo "=== Java ==="
        java -version
        echo "=== Maven ==="
        mvn --version

    - name: Maven build
      shell: bash
      run: mvn --batch-mode verify
